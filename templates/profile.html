{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] py-12">
    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl border border-slate-100 p-8 text-center fade-in">
        <div class="relative inline-block">
            <div class="w-24 h-24 bg-brand-50 rounded-full flex items-center justify-center text-brand-600 text-4xl mb-6 mx-auto border-4 border-white shadow-lg">
                <i class="fas fa-user"></i>
            </div>                                 
            <div class="absolute bottom-6 right-0 w-6 h-6 bg-green-500 border-4 border-white rounded-full"></div>
        </div>
        
        <h2 class="text-3xl font-bold text-slate-900 mb-1">{{ username }}</h2>
        
        <!-- Added Email Display -->
        <div class="flex items-center justify-center space-x-2 mb-4 text-slate-500">
            <i class="fas fa-envelope text-sm text-slate-400"></i>
            <span class="text-sm font-medium">{{ username }}@secure-demo.app</span>
        </div>

        <span class="inline-block px-3 py-1 bg-slate-100 text-slate-500 text-xs font-bold uppercase tracking-wider rounded-full mb-8">User</span>
        
        <div class="grid grid-cols-1 gap-4 mb-8 justify-items-center">
            <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 w-full max-w-xs">
                <div class="text-2xl font-bold text-slate-800">Active</div>
                <div class="text-xs text-slate-400 font-bold uppercase">Status</div>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <a href="{{ url_for('dashboard') }}" class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl shadow-lg shadow-brand-500/20 transition-all">
                <i class="fas fa-columns mr-2"></i>Access Dashboard
            </a>
            <a href="{{ url_for('logout') }}" class="w-full py-3 bg-white border border-red-100 text-red-600 hover:bg-red-50 font-bold rounded-xl transition-all">
                Terminate Session
            </a>
        </div>
    </div>
</div>
{% endblock %}
